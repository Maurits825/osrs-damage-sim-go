<div>
  <nav class="navbar navbar-expand-sm bg-light mb-3 rounded">
    <div class="container-fluid">
      <ul class="navbar-nav nav-tabs flex-wrap">
        <li class="nav-item" *ngFor="let inputSetup of inputGearSetups; index as i">
          <div class="d-flex align-items-center justify-content-between px-3 pb-2">
            <button
              type="button"
              class="btn btn-primary me-2"
              [disabled]="inputGearSetups.length >= maxSetupTabs"
              (click)="openNewSetupTab(inputSetup)"
            >
              <i class="bi bi-clipboard-plus"></i>
            </button>
            <div>
              <button type="button" class="btn btn-outline-danger btn-sm" (click)="deleteTab(i)">
                <i class="bi bi-x"></i>
              </button>
            </div>
          </div>

          <a
            class="nav-link"
            role="button"
            [ngClass]="{
              active: activeTab === i,
            }"
            (click)="selectTab(i)"
          >
            <div class="text-center fs-5">Setup - {{ i + 1 }}</div>
          </a>
        </li>

        <div>
          <button
            type="button"
            class="btn btn-primary btn-lg ms-3 my-2"
            *ngIf="inputGearSetups.length < maxSetupTabs"
            (click)="openNewSetupTab()"
          >
            <i class="bi bi-plus"></i> Add setup
          </button>
        </div>
      </ul>

      <div>
        <div class="d-flex align-items-center mb-1">
          <div>
            <input class="form-control" type="text" [(ngModel)]="inputPresetName" placeholder="Preset name" />
          </div>
          <ng-template #saveGearSetupPop let-error="error">
            <div *ngIf="error" class="text-danger">
              {{ error }}
            </div>
            <div *ngIf="error === undefined" class="text-success">Saved!</div>
          </ng-template>
          <div class="ms-1">
            <button
              type="button"
              class="btn btn-primary"
              [ngbPopover]="saveGearSetupPop"
              triggers="manual"
              #saveGearPopover="ngbPopover"
              (click)="savePreset(saveGearPopover)"
            >
              Save <i class="bi bi-download"></i>
            </button>
          </div>
        </div>
        <div class="ms-auto d-flex align-items-center">
          <div class="me-2">Load preset</div>
          <div class="flex-grow-1">
            <app-ng-select-lazy-load
              [valueType]="InputGearSetupPreset"
              [allValues]="inputGearSetupPresets"
              [selectedValue]="selectedInputGearSetupPreset"
              [clearable]="false"
              searchProperty="name"
              placeholder="Select preset"
              (valueChanged)="selectedPresetChange($event)"
            >
              <ng-template #dropdownLabel let-item="item">{{ item.name }}</ng-template>
              <ng-template #dropdownOptions let-item="item">
                <div class="d-flex align-items-center">
                  <div>
                    {{ item.name }}
                  </div>
                  <div class="ms-auto">
                    <button
                      type="button"
                      class="btn btn-outline-danger btn-sm"
                      (click)="deletePreset($event, item.name)"
                    >
                      <i class="bi bi-x"></i>
                    </button>
                  </div>
                </div>
              </ng-template>
            </app-ng-select-lazy-load>
          </div>
        </div>
      </div>
    </div>
  </nav>
  <ng-container *ngFor="let inputSetup of inputGearSetups; index as i">
    <div [hidden]="activeTab !== i">
      <div class="row justify-content-center">
        <div class="mb-2 col-12 col-lg-10 col-xl-8 col-xxl-7">
          <app-gear-setup-settings [(gearSetupSettings)]="inputSetup.gearSetupSettings"></app-gear-setup-settings>
        </div>
      </div>

      <div class="row justify-content-center">
        <div class="p-0 col-xl-7 col-lg-10 col-12">
          <app-gear-setup [(gearSetup)]="inputSetup.gearSetup"></app-gear-setup>
        </div>
      </div>
    </div>
  </ng-container>
</div>
